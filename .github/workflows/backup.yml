name: Weekly Database Backup

on:
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at Midnight UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL 17 Client
        run: |
          # Add the official PostgreSQL repository to get version 17
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Run pg_dump
        run: |
          # Explicitly use pg_dump version 17
          /usr/lib/postgresql/17/bin/pg_dump "${{ secrets.DATABASE_URL }}" > backup.sql

      - name: Upload Backup File
        uses: actions/upload-artifact@v4
        with:
          name: visionbridge-db-backup
          path: backup.sql
          retention-days: 30